<script>
		$('#btnForm').on('click', function(){
			$(this).addClass('hidden');
			$('#formDiv, #btnList').removeClass('hidden');
			$('#listDiv').addClass('hidden');
			$('#btnsubmit').html('Submit');
			$('#blah').attr('src', '/images/noimage.jpg').width(110).height(110);

			$(".form")[0].reset();
			$('#passDiv').removeClass('hidden');
			$('.input-hidden').val('0');
		});

		$('#btnList').on('click', function(){
			$("form")[0].reset();
			$(this).addClass('hidden');
			$('#formDiv').addClass('hidden');
			$('#listDiv, #btnForm').removeClass('hidden');
		});

		function readURL(input,id) {
			if (input.files && input.files[0]) {
				var reader = new FileReader();

				reader.onload = function (e) {
					$('#'+id).attr('src', e.target.result).width(110).height(110);
					$('#'+id).css('border','2px');
					$('#'+id).css('border-style','solid');
					$('#'+id).css('border-color','rgb(228, 220, 218)');				
					$('#'+id).css('background-color','#DDD');
				
				};

				reader.readAsDataURL(input.files[0]);
			}
		}

		jQuery.validator.addMethod("alphanumspace", function(value, element) {
		return this.optional(element) || /^[a-zA-Z0-9 \u0080-\u9fff]+$/i.test(value);
		}, "Invalid name"); 

		//only for alphabets,number,space
		jQuery.validator.addMethod("alphanum", function(value, element) {
		return this.optional(element) || /^[a-zA-Z0-9]+$/i.test(value);
		}, "Invalid name"); 

		//only for number
		jQuery.validator.addMethod("numberonly", function(value, element) {
		return this.optional(element) || /^[0-9]+$/i.test(value);
		}, "Invalid Number");

		//only for number and dot
		jQuery.validator.addMethod("numberdot", function(value, element) {
		return this.optional(element) || /^[0-9\.]+$/i.test(value);
		}, "Invalid Number");

		jQuery.validator.addMethod("alpha", function(value, element) {
		return this.optional(element) || /^[a-zA-Z]+$/i.test(value);
		}, "Invalid Name");


		function numbonly(e) {
			var k = e.which;
			var ok = k >= 48 && k <= 57 || // 0-9
				k ==8 || //backspace
				k==0 || //arrow key
				k==46; //. sign
			if (!ok){
				e.preventDefault();
			}
		}
	</script>
